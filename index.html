<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080f;
  --surface: #0d1017;
  --border: rgba(255,255,255,0.07);
  --text: #e8eaf0;
  --muted: rgba(232,234,240,0.45);
  --panel: #0a0d16;

  --c-alkali:      #ef4444;
  --c-alkaline:    #f97316;
  --c-lanthanide:  #eab308;
  --c-actinide:    #84cc16;
  --c-transition:  #06b6d4;
  --c-post:        #8b5cf6;
  --c-metalloid:   #ec4899;
  --c-nonmetal:    #22c55e;
  --c-halogen:     #14b8a6;
  --c-noble:       #3b82f6;

  --cell: 74px;
  --gap: 4px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
.hidden { display: none !important; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body.bangla { font-family: 'Noto Serif Bengali', sans-serif; }

/* grain */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
}

/* ── NAVBAR ── */
.navbar {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(6,8,15,0.85);
  backdrop-filter: blur(20px);
  gap: 1rem; flex-wrap: wrap;
}
.backBtn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: 'Space Mono', monospace; font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  padding: 0.4rem 0.85rem; border-radius: 7px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  transition: all 0.2s; flex-shrink: 0;
}
.backBtn:hover { color: var(--text); border-color: rgba(196,106,232,0.5); background: rgba(196,106,232,0.07); }
.backBtn svg { width: 13px; height: 13px; }
.navCenter { flex: 1; display: flex; justify-content: center; }
.langToggleBtn {
  font-family: 'Space Mono', monospace; font-size: 0.72rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: rgba(196,106,232,0.1); color: #d87cf7;
  border: 1px solid rgba(196,106,232,0.3);
  padding: 0.4rem 0.9rem; border-radius: 20px; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.langToggleBtn:hover { background: rgba(196,106,232,0.2); border-color: rgba(196,106,232,0.55); }

/* ── HEADER ── */
header {
  position: relative; z-index: 10;
  padding: 1.8rem 2.5rem 1.2rem;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 1.5rem;
  flex-wrap: wrap;
}
.hTitle {
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  font-weight: 800; letter-spacing: -0.02em; line-height: 1;
}
.hTitle span {
  color: transparent;
  background: linear-gradient(90deg, #c46ae8, #f472b6);
  -webkit-background-clip: text; background-clip: text;
}
.hSub {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted); margin-top: 0.45rem;
}
.hControls { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
#searchInput {
  font-family: 'Space Mono', monospace; font-size: 0.82rem;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--text); padding: 0.5rem 1rem;
  border-radius: 6px; outline: none; width: 210px;
  transition: border-color 0.2s;
}
#searchInput:focus { border-color: rgba(96,165,250,0.4); }
#searchInput::placeholder { color: var(--muted); }
.filterBtn {
  font-family: 'Space Mono', monospace; font-size: 0.7rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.45rem 0.85rem; border-radius: 6px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  transition: all 0.18s;
}
.filterBtn:hover, .filterBtn.active { color: var(--text); border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.06); }
.filterBtn.active { border-color: var(--accent, #60a5fa); color: var(--accent, #60a5fa); }

/* ── MAIN LAYOUT ── */
.mainWrap {
  position: relative; z-index: 1;
  display: flex; gap: 0; align-items: flex-start;
  padding: 0 1.2rem 2rem;
}

/* ── TABLE ── */
.tableWrap { flex: 1; overflow-x: auto; }
.ptGrid {
  display: grid;
  grid-template-columns: repeat(18, var(--cell));
  grid-template-rows: repeat(7, var(--cell)) 14px repeat(2, var(--cell));
  gap: var(--gap);
  column-gap: var(--gap);
  row-gap: var(--gap);
  width: max-content;
  padding: 0.5rem;
}
/* series placeholder buttons in main table rows 6 & 7, col 3 */
.seriesPlaceholder {
  width: var(--cell); height: var(--cell);
  border-radius: 5px;
  border: 1px dashed rgba(255,255,255,0.12);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: default;
  background: rgba(255,255,255,0.01);
  gap: 3px;
}
.seriesPlaceholder .spDots {
  display: flex; gap: 3px;
}
.seriesPlaceholder .spDot {
  width: 4px; height: 4px; border-radius: 50%;
}
.seriesPlaceholder .spLabel {
  font-family: 'Space Mono', monospace;
  font-size: 0.52rem; letter-spacing: 0.1em;
  text-transform: uppercase; opacity: 0.5;
  text-align: center;
}

/* ── ELEMENT CELL ── */
.el {
  width: var(--cell); height: var(--cell);
  border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  background: var(--elBg, rgba(255,255,255,0.03));
  transition: transform 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
  animation: cellIn 0.4s ease both;
  overflow: hidden;
}
.el::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--elColor, transparent);
  opacity: 0.11; border-radius: inherit;
  transition: opacity 0.2s;
}
.el:hover {
  transform: scale(1.16) translateZ(0);
  z-index: 50;
  border-color: var(--elColor, rgba(255,255,255,0.3));
  box-shadow: 0 0 20px var(--elColor, transparent), 0 8px 24px rgba(0,0,0,0.5);
}
.el:hover::before { opacity: 0.22; }
.el.dim { opacity: 0.12; }
.el.highlight { opacity: 1; transform: scale(1.05); border-color: var(--elColor); }
.el.pinned {
  border-color: var(--elColor) !important;
  box-shadow: 0 0 0 2px var(--elColor), 0 0 20px var(--elColor), 0 8px 24px rgba(0,0,0,0.5) !important;
  z-index: 51;
}

@keyframes cellIn {
  from { opacity: 0; transform: scale(0.8); }
  to   { opacity: 1; transform: scale(1); }
}

.elNum {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem; color: var(--muted);
  position: absolute; top: 5px; left: 6px;
  letter-spacing: 0.04em;
}
.elSym {
  font-size: 1.6rem; font-weight: 800; line-height: 1;
  color: var(--elColor, var(--text));
  transition: color 0.2s;
}
.elName {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem; color: var(--muted);
  margin-top: 2px; letter-spacing: 0.03em;
  text-align: center; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; max-width: 68px;
}
.elMass {
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem; color: var(--muted);
  margin-top: 1px;
}

/* placeholder cell */
.ph { grid-column: span 1; }

/* lanthanide/actinide gap labels */
.seriesLabel {
  grid-column: 3 / span 1;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace; font-size: 0.52rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); opacity: 0.5;
}

/* ── DETAIL PANEL ── */
.panel {
  width: 320px; flex-shrink: 0;
  position: sticky; top: 1rem;
  margin-left: 1.5rem;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.6rem;
  transition: opacity 0.3s;
  min-height: 480px;
}
.panelEmpty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; min-height: 380px; opacity: 0.3;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem; letter-spacing: 0.12em;
  text-transform: uppercase; text-align: center;
  gap: 0.6rem;
}
.panelEmpty .bigSym { font-size: 4rem; font-weight: 800; opacity: 0.15; }
.pHeader { margin-bottom: 1.2rem; }
.pNum {
  font-family: 'Space Mono', monospace; font-size: 0.7rem;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.3rem;
}
.pSym {
  font-size: 4.2rem; font-weight: 800; line-height: 1;
  color: transparent; -webkit-background-clip: text; background-clip: text;
  background: linear-gradient(135deg, var(--pColor, #60a5fa), white 180%);
}
.pName {
  font-size: 1.3rem; font-weight: 700; letter-spacing: 0.02em; margin-top: 0.2rem;
}
.pCat {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.22rem 0.6rem; border-radius: 4px; margin-top: 0.5rem;
  display: inline-block;
  border: 1px solid var(--pColor, #60a5fa);
  color: var(--pColor, #60a5fa);
  background: rgba(255,255,255,0.03);
}
.pDivider { height: 1px; background: var(--border); margin: 1rem 0; }
.pGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
.pStat label {
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); display: block; margin-bottom: 0.25rem;
}
.pStat value {
  font-size: 0.92rem; font-weight: 700; display: block;
}
.pConfig {
  font-family: 'Space Mono', monospace; font-size: 0.7rem;
  line-height: 1.6; padding: 0.65rem 0.8rem;
  background: rgba(255,255,255,0.03); border-radius: 6px;
  border-left: 2px solid var(--pColor, #60a5fa);
  word-break: break-all; margin-top: 0.8rem;
  color: var(--pColor, #60a5fa);
}
.pDesc {
  font-size: 0.85rem; line-height: 1.7; opacity: 0.65;
  margin-top: 0.9rem;
}

/* ── LEGEND ── */
.legend {
  position: relative; z-index: 1;
  display: flex; flex-wrap: wrap; gap: 0.55rem;
  padding: 0.8rem 1.7rem 1.8rem;
}
.lItem {
  display: flex; align-items: center; gap: 0.45rem;
  font-family: 'Space Mono', monospace; font-size: 0.68rem;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); cursor: pointer;
  padding: 0.32rem 0.65rem; border-radius: 4px;
  border: 1px solid transparent;
  transition: all 0.18s;
}
.lItem:hover { color: var(--text); border-color: var(--border); }
.lItem.active { color: var(--text); border-color: var(--lc); background: rgba(255,255,255,0.04); }
.lDot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

@media (max-width: 1100px) {
  .panel { display: none; }
  .mainWrap { padding: 0; }
}
@media (max-width: 600px) {
  :root { --cell: 36px; --gap: 2px; }
  .elName, .elMass { display: none; }
  .elSym { font-size: 0.9rem; }
  header { padding: 1.2rem 1rem 0.8rem; }
  .hControls { width: 100%; }
  #searchInput { width: 100%; flex: 1; }
}
</style>
</head>

<!-- NAVBAR -->
<nav class="navbar">

  <div>

  </div>
</header>

<div class="legend" id="legend"></div>

<div class="mainWrap">
  <div class="tableWrap">

</div>

let lastPanelZ = null;

function buildLegend() {
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const item = document.createElement('div');
    item.className = 'lItem' + (activeCatFilter === key ? ' active' : '');
    item.dataset.cat = key;
    item.style.setProperty('--lc', cat.color);
    const label = lang === 'bn' ? cat.labelBn : cat.label;
    item.innerHTML = `<span class="lDot" style="background:${cat.color}"></span>${label}`;
    item.addEventListener('click', () => filterByCategory(key));
    legendEl.appendChild(item);
  });
}

// BUILD GRID  — each cell placed explicitly via inline grid-row/grid-column
// ─────────────────────────────────────────────────────────────────────────────
const grid = document.getElementById('ptGrid');

// Build a set of filled positions for quick lookup
const filledPos = new Set(POSITIONS.map(([,r,c]) => `${r}_${c}`));

function makeCell(z) {
  const el = elMap[z];
  const [num,sym,name,mass,cat,,,,,,,,] = el;
  const color = CATEGORIES[cat]?.color || '#fff';

  const cell = document.createElement('div');
  cell.className = 'el';
  cell.dataset.z = num;
  cell.dataset.cat = cat;
  cell.dataset.name = name.toLowerCase();
  cell.dataset.sym = sym.toLowerCase();
  cell.style.setProperty('--elColor', color);

  const massStr = typeof mass === 'number'
    ? (mass % 1 === 0 ? `(${mass})` : mass.toFixed(mass < 10 ? 3 : 2))
    : mass;

  cell.innerHTML = `
    <span class="elNum">${num}</span>
    <span class="elSym">${sym}</span>
    <span class="elName">${name}</span>
    <span class="elMass">${massStr}</span>
  `;
  cell.addEventListener('mouseenter', () => showPanel(z));
  cell.addEventListener('click', () => lockPanel(z));
  return cell;
}

// Place all real elements
POSITIONS.forEach(([z, row, col]) => {
  const cell = makeCell(z);
  cell.style.gridRow = row;
  cell.style.gridColumn = col;
  // stagger animation based on reading order
  cell.style.animationDelay = ((row - 1) * 18 + (col - 1)) * 6 + 'ms';
  grid.appendChild(cell);
});

  { row: 9,  label: 'La', color: CATEGORIES.lanthanide.color },
  { row: 10, label: 'Ac', color: CATEGORIES.actinide.color },
].forEach(({ row, label, color }) => {
  const lbl = document.createElement('div');
  lbl.style.cssText = `
    grid-row:${row}; grid-column:1 / 3;
    display:flex; align-items:center; justify-content:flex-end; padding-right:6px;
  `;
  lbl.innerHTML = `<span style="font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;color:${color};opacity:0.5;text-transform:uppercase;">${label} series</span>`;
  grid.appendChild(lbl);
});

// ─────────────────────────────────────────────────────────────────────────────
// PANEL
// ─────────────────────────────────────────────────────────────────────────────
let panelLocked = false;

function lockPanel(z) {
  panelLocked = true;
  lastPanelZ = z;
  renderPanel(z);
  document.querySelectorAll('.el').forEach(c => c.classList.remove('pinned'));
  document.querySelector(`.el[data-z="${z}"]`)?.classList.add('pinned');
}

function showPanel(z) {
  if (panelLocked) return;
  lastPanelZ = z;
  renderPanel(z);
}

function renderPanel(z) {
  const el = elMap[z];
  if (!el) return;
  const [num,sym,name,mass,cat,period,grp,config,melt,boil,density,disc,descEn] = el;
  const color = CATEGORIES[cat]?.color || '#fff';
  const catLabel = lang === 'bn'
    ? (CATEGORIES[cat]?.labelBn || CATEGORIES[cat]?.label)
    : (CATEGORIES[cat]?.label || cat);

  const bnData = BN[num];
  const displayName = (lang === 'bn' && bnData) ? bnData[0] : name;
  const displayDesc = (lang === 'bn' && bnData) ? bnData[1] : descEn;

  document.getElementById('panelEmpty').style.display = 'none';
  const content = document.getElementById('panelContent');
  content.style.display = 'block';

  const fmtMass = v => typeof v === 'number'
    ? (v % 1 === 0 ? `[${v}]` : v.toFixed(3))
    : String(v);
  const fmtTemp = v => v == null ? '—' : `${v > 0 ? '+' : ''}${v} °C`;

  const labelZ      = lang === 'bn' ? 'পারমাণবিক সংখ্যা' : 'Z';
  const labelDisc   = lang === 'bn' ? 'আবিষ্কার' : 'Discovered';
  const labelMass   = lang === 'bn' ? 'পারমাণবিক ভর' : 'Atomic mass';
  const labelPG     = lang === 'bn' ? 'পর্যায় / গ্রুপ' : 'Period / Group';
  const labelMelt   = lang === 'bn' ? 'গলনাঙ্ক' : 'Melting pt.';
  const labelBoil   = lang === 'bn' ? 'স্ফুটনাঙ্ক' : 'Boiling pt.';
  const labelDens   = lang === 'bn' ? 'ঘনত্ব' : 'Density';
  const labelState  = lang === 'bn' ? '২৫°C-এ অবস্থা' : 'State @ 25°C';
  const labelConfig = lang === 'bn' ? 'ইলেকট্রন বিন্যাস' : 'Electron config';
  const stateVal    = getState(melt, boil);
  const stateMap    = { '🔩 Solid': '🔩 কঠিন', '💧 Liquid': '💧 তরল', '💨 Gas': '💨 গ্যাস', '—': '—' };

  content.innerHTML = `
    <div class="pHeader">
      <div class="pNum">${labelZ} = ${num} &nbsp;·&nbsp; ${labelDisc} ${disc}</div>
      <div class="pSym" style="background:linear-gradient(135deg,${color},rgba(255,255,255,0.85) 200%);-webkit-background-clip:text;background-clip:text;color:transparent;font-size:4.2rem;font-weight:800;line-height:1;">${sym}</div>
      <div class="pName">${displayName}</div>
      ${lang === 'bn' && bnData ? `<div style="font-size:0.72rem;opacity:0.4;font-family:'Space Mono',monospace;margin-top:2px;">${name}</div>` : ''}
      <div class="pCat" style="color:${color};border-color:${color}">${catLabel}</div>
    </div>
    <div class="pDivider"></div>
    <div class="pGrid">
      <div class="pStat"><label>${labelMass}</label><value>${fmtMass(mass)} u</value></div>
      <div class="pStat"><label>${labelPG}</label><value>${period} / ${grp || 'f-block'}</value></div>
      <div class="pStat"><label>${labelMelt}</label><value style="font-size:0.75rem">${fmtTemp(melt)}</value></div>
      <div class="pStat"><label>${labelBoil}</label><value style="font-size:0.75rem">${fmtTemp(boil)}</value></div>
      <div class="pStat"><label>${labelDens}</label><value style="font-size:0.75rem">${density != null ? density + ' g/cm³' : '—'}</value></div>
      <div class="pStat"><label>${labelState}</label><value>${lang === 'bn' ? (stateMap[stateVal] || stateVal) : stateVal}</value></div>
    </div>
    <div class="pConfig" style="border-left:2px solid ${color};color:${color}">${config}</div>
    <div class="pDesc">${displayDesc}</div>
    ${panelLocked ? `<div style="margin-top:0.8rem;font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;opacity:0.3;text-transform:uppercase;">${lang === 'bn' ? 'আনলক করতে অন্য জায়গায় ক্লিক করুন' : 'Click elsewhere to unlock'}</div>` : ''}
  `;
}

function getState(melt, boil) {
  if (melt == null) return '—';
  if (melt > 25) return '🔩 Solid';
  if (boil != null && boil < 25) return '💨 Gas';
  return '💧 Liquid';
}

// Click outside unlocks panel
document.addEventListener('click', e => {
  if (!e.target.closest('.el') && !e.target.closest('.panel')) {
    panelLocked = false;
    document.querySelectorAll('.el').forEach(c => c.classList.remove('pinned'));
  }
});

// ─────────────────────────────────────────────────────────────────────────────
// SEARCH & FILTER
// ─────────────────────────────────────────────────────────────────────────────
let activeFilter = null;
let activeSearch = '';

document.getElementById('searchInput').addEventListener('input', function() {
  activeSearch = this.value.toLowerCase().trim();
  applyFilter();
});

document.querySelectorAll('.filterBtn').forEach(btn => {
  btn.addEventListener('click', function() {
    const f = this.dataset.filter;
    activeFilter = (activeFilter === f || f === 'all') ? null : f;
    document.querySelectorAll('.filterBtn').forEach(b => b.classList.remove('active'));
    if (activeFilter) this.classList.add('active');
    applyFilter();
  });
});

function filterByCategory(cat) {
  activeCatFilter = (activeCatFilter === cat) ? null : cat;
  buildLegend();
  document.querySelectorAll('.filterBtn').forEach(b => b.classList.remove('active'));
  applyFilter();
}

function applyFilter() {
  const cells = document.querySelectorAll('.el');
  cells.forEach(cell => {
    const cat  = cell.dataset.cat;
    const name = cell.dataset.name;
    const sym  = cell.dataset.sym;
    const z    = parseInt(cell.dataset.z);

    let matchSearch = true;
    if (activeSearch) {
      matchSearch = name.includes(activeSearch)
        || sym.includes(activeSearch)
        || String(z) === activeSearch
        || String(z).startsWith(activeSearch);
    }

    let matchFilter = true;
    const currentFilter = activeFilter || activeCatFilter;
    if (currentFilter) {
      if (['metal','nonmetal','noble'].includes(currentFilter)) {
        matchFilter = CATEGORIES[cat]?.group === currentFilter;
      } else {
        matchFilter = cat === currentFilter;
      }
    }

    const show = matchSearch && matchFilter;
    const hasQuery = !!(activeSearch || activeFilter || activeCatFilter);
    cell.classList.toggle('dim', !show);
    cell.classList.toggle('highlight', show && hasQuery);
    if (!hasQuery) {
      cell.classList.remove('dim');
      cell.classList.remove('highlight');
    }
  });
}
</script>
